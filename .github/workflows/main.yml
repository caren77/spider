name: Daily Spider

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 升级到 v4，解决警告

      - name: Set up Python
        uses: actions/setup-python@v5  # 升级到 v5，解决警告
        with:
          python-version: '3.11'   # 换个更现代的版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 这里很关键：如果你没有 requirements.txt，
          # 就在下面这行直接写：pip install requests beautifulsoup4 (根据你实际用的库改)
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "No requirements.txt found"; fi

      - name: Run spider
        run: python python/homeworkbug.py
